name: Build Windows & Mac Installers

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (default: master)'
        required: false
        default: 'master'

jobs:
  distributions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.branch || 'master' }}
      - name: Free disk space
        shell: bash
        run: |
          echo "Disk space before cleanup:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/share/swift \
            /usr/share/miniconda \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/lib/node_modules \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/PyPy \
            /opt/hostedtoolcache/Python \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/node \
            /opt/microsoft \
            /opt/google \
            /imagegeneration \
            /var/cache/apt/archives
          sudo apt-get -y clean
          docker image prune --all --force || true
          docker builder prune --all --force || true
          echo "Disk space after cleanup:"
          df -h /
      - name: Expand swap
        shell: bash
        run: |
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile /swapfile
          sudo fallocate -l 30G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h
      - name: Checkout JetBrains/android
        uses: actions/checkout@v6.0.2
        with:
          repository: JetBrains/android
          path: android
          ref: ${{ github.event.inputs.branch || 'master' }}
      - name: Build environment
        shell: bash
        run: docker build . --target intellij_idea --tag intellij_idea
      - name: Build
        shell: bash
        run: docker run --rm --user "$(id -u)" --volume "${PWD}:/community" intellij_idea
      - name: upload-windows-x64
        uses: ./.github/actions/upload_ide
        with:
          os: windows
          suffix: .exe
          artifacts_dir: out/idea-ce/artifacts
      - name: upload-mac-aarch64
        uses: ./.github/actions/upload_ide
        with:
          os: mac
          suffix: -aarch64.sit
          artifacts_dir: out/idea-ce/artifacts
      - name: Upload .dmg build scripts
        uses: actions/upload-artifact@v6.0.0
        with:
          name: dmg-build-scripts
          if-no-files-found: 'error'
          retention-days: 1
          path: out/idea-ce/artifacts/macos-dmg-build/
  dmg:
    runs-on: macos-latest
    needs: distributions
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Download .dmg build scripts
        uses: actions/download-artifact@v7.0.0
        with:
          name: dmg-build-scripts
      - name: Download aarch64.sit
        uses: actions/download-artifact@v7.0.0
        with:
          name: mac-aarch64.sit-unsigned
      - name: Build aarch64.dmg
        shell: bash
        run: /bin/bash ./build.sh
      - name: Upload .dmg
        uses: ./.github/actions/upload_ide
        with:
          os: mac
          suffix: -aarch64.dmg
          artifacts_dir: .
